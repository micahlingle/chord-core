<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chord Core Milestone 1 Architecture</title>
  <desc id="desc">UML-style architecture diagram showing the current Chord Core WAV loading, mono conversion, block processing, RMS calculation, and console output flow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 1 7 L 7 1 L 13 7 L 7 13 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffffff" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { fill: #ffffff; font: 700 28px "Avenir Next", "Segoe UI", sans-serif; letter-spacing: 0.6px; }
      .subtitle { fill: #d8dee9; font: 500 14px "Avenir Next", "Segoe UI", sans-serif; letter-spacing: 0.4px; }
      .label { fill: #ffffff; font: 700 17px "Avenir Next", "Segoe UI", sans-serif; }
      .small { fill: #d8dee9; font: 500 13px "Avenir Next", "Segoe UI", sans-serif; }
      .code { fill: #eef3ff; font: 600 13px "SFMono-Regular", "Cascadia Mono", "Liberation Mono", monospace; }
      .box { fill: rgba(255, 255, 255, 0.035); stroke: #ffffff; stroke-width: 1.6; rx: 18; filter: url(#softGlow); }
      .package { fill: rgba(255, 255, 255, 0.025); stroke: #ffffff; stroke-width: 1.7; rx: 22; }
      .packageTab { fill: rgba(255, 255, 255, 0.08); stroke: #ffffff; stroke-width: 1.4; }
      .stub { fill: rgba(255, 255, 255, 0.015); stroke: #ffffff; stroke-width: 1.4; stroke-dasharray: 7 6; rx: 16; }
      .flow { fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .dependency { fill: none; stroke: #ffffff; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .composition { fill: none; stroke: #ffffff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-start: url(#diamond); marker-end: url(#arrow); }
      .divider { stroke: #ffffff; stroke-width: 1; opacity: 0.34; }
    </style>
  </defs>

  <g transform="translate(54 56)">
    <text class="title" x="0" y="0">Chord Core Architecture</text>
    <text class="subtitle" x="0" y="28">Milestone 1: WAV loading, mono block processing, and RMS output</text>
  </g>

  <g transform="translate(54 108)">
    <rect class="package" x="0" y="0" width="1092" height="592"/>
    <path class="packageTab" d="M 0 22 Q 0 0 22 0 H 264 Q 282 0 294 16 L 310 38 H 0 Z"/>
    <text class="label" x="26" y="27">chord-core CMake project</text>
    <text class="small" x="846" y="31">C++17 • portable library first</text>
  </g>

  <g transform="translate(96 190)">
    <rect class="box" x="0" y="0" width="230" height="112"/>
    <text class="label" x="24" y="32">WAV File</text>
    <line class="divider" x1="24" y1="48" x2="206" y2="48"/>
    <text class="code" x="24" y="73">datasets/*.wav</text>
    <text class="small" x="24" y="95">file-based input mode</text>
  </g>

  <g transform="translate(412 158)">
    <rect class="box" x="0" y="0" width="272" height="174"/>
    <text class="label" x="24" y="34">chord_core_demo</text>
    <line class="divider" x1="24" y1="52" x2="248" y2="52"/>
    <text class="code" x="24" y="78">src/main.cpp</text>
    <text class="small" x="24" y="105">parses CLI WAV path</text>
    <text class="small" x="24" y="128">walks samples in 1024 blocks</text>
    <text class="small" x="24" y="151">prints timing + RMS</text>
  </g>

  <g transform="translate(786 170)">
    <rect class="box" x="0" y="0" width="286" height="136"/>
    <text class="label" x="24" y="34">Console Output</text>
    <line class="divider" x1="24" y1="52" x2="262" y2="52"/>
    <text class="code" x="24" y="80">Block N start=... rms=...</text>
    <text class="small" x="24" y="107">human-readable debug trace</text>
  </g>

  <g transform="translate(126 392)">
    <rect class="package" x="0" y="0" width="650" height="236"/>
    <path class="packageTab" d="M 0 18 Q 0 0 18 0 H 168 Q 186 0 198 16 L 214 36 H 0 Z"/>
    <text class="label" x="24" y="26">libchord_core.a</text>

    <g transform="translate(36 72)">
      <rect class="box" x="0" y="0" width="240" height="118"/>
      <text class="label" x="22" y="32">AudioLoader</text>
      <line class="divider" x1="22" y1="48" x2="218" y2="48"/>
      <text class="code" x="22" y="73">loadWavFile(path)</text>
      <text class="small" x="22" y="96">downmixes interleaved audio to mono</text>
    </g>

    <g transform="translate(360 52)">
      <rect class="box" x="0" y="0" width="244" height="78"/>
      <text class="label" x="22" y="31">AudioFileData</text>
      <text class="code" x="22" y="56">samples, sampleRate, channels</text>
    </g>

    <g transform="translate(360 150)">
      <rect class="stub" x="0" y="0" width="244" height="58"/>
      <text class="label" x="22" y="27">ChordDetector</text>
      <text class="small" x="22" y="47">API stub for later milestones</text>
    </g>
  </g>

  <g transform="translate(826 404)">
    <rect class="package" x="0" y="0" width="264" height="224"/>
    <path class="packageTab" d="M 0 18 Q 0 0 18 0 H 124 Q 142 0 154 16 L 170 36 H 0 Z"/>
    <text class="label" x="22" y="26">Next milestones</text>

    <rect class="stub" x="28" y="62" width="208" height="42"/>
    <text class="small" x="48" y="88">FFTProcessor</text>

    <rect class="stub" x="28" y="118" width="208" height="42"/>
    <text class="small" x="48" y="144">ChromaExtractor</text>

    <rect class="stub" x="28" y="174" width="208" height="42"/>
    <text class="small" x="48" y="200">ChordDetector</text>
  </g>

  <g transform="translate(408 644)">
    <rect class="box" x="0" y="0" width="290" height="60"/>
    <text class="label" x="22" y="36">External dependency: libsndfile</text>
  </g>

  <path class="flow" d="M 326 246 H 402"/>
  <path class="flow" d="M 684 246 H 776"/>
  <path class="composition" d="M 548 332 V 374 Q 548 392 530 392 H 444"/>
  <path class="flow" d="M 438 523 H 486"/>
  <path class="dependency" d="M 548 522 H 548 V 541 H 846"/>
  <path class="dependency" d="M 408 674 H 302 Q 280 674 280 652 V 582"/>

  <g transform="translate(96 336)">
    <text class="small" x="0" y="0">Runtime flow</text>
    <path class="flow" d="M 0 20 H 130"/>
    <text class="small" x="160" y="24">solid arrows</text>
  </g>

  <g transform="translate(96 704)">
    <text class="small" x="0" y="0">Dashed outlines indicate scaffolded components reserved for Milestones 2-5.</text>
  </g>
</svg>
